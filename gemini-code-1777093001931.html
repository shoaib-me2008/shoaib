    <style>
        :root { --primary-color: #2563eb; --bg-color: #f8fafc; --text-color: #1e293b; }
        
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        
        .container { max-width: 500px; width: 100%; background: #ffffff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; transition: transform 0.3s ease; }

        h1 { margin: 0; font-size: 1.8rem; color: #000; }
        .tagline { color: var(--primary-color); font-weight: 600; margin-bottom: 25px; letter-spacing: 1px; }
        
        .bio { font-size: 0.95rem; color: #64748b; line-height: 1.8; margin-bottom: 30px; }
        
        .social-grid { display: grid; gap: 12px; }
        
        .social-link { 
            background: #f1f5f9; padding: 12px 20px; border-radius: 12px; 
            text-decoration: none; color: var(--text-color); font-weight: 500;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: all 0.3s ease; border: 1px solid #e2e8f0;
        }
        
        .social-link:hover { background: var(--primary-color); color: #fff; transform: translateY(-3px); }
        .social-link i { font-size: 1.2rem; }
    </style>
</head>
